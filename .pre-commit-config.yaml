exclude: ^(data/|outputs/|external/|docs/roadmap/)

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^docs/research/17_source_verification_log\.md$
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-case-conflict
      - id: check-added-large-files
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.11
    hooks:
      - id: ruff
      - id: ruff-format
        args: [--check]

  - repo: local
    hooks:
      - id: research-release-validator
        name: research release validator
        entry: python scripts/validate_research_release.py --ci
        language: system
        pass_filenames: false
        always_run: true
      - id: context-cache-validator
        name: context cache validator
        entry: python scripts/validate_context_cache.py
        language: system
        pass_filenames: false
        always_run: true
      - id: claim-registry-validator
        name: claim registry validator
        entry: python scripts/check_claim_registry.py
        language: system
        pass_filenames: false
        always_run: true
